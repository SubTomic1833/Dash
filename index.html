<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
        <meta charset="UTF-8">
        <title>COSMO-RUN</title>
        <style>
            body{
                margin: 0;
                overflow: hidden;
                font-family: 'inter', sans-serif;

                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background:#050505;
            }
            body::before{
                content:"";
                position:fixed;
                inset:0;
                background:radial-gradient(circle at center, rgba(255,255,255,0.04), transparent 60%), radial-gradient(circle at 20% 30%, rgba(255,255,255,0.02), transparent 50%);
                pointer-events:none;
            }
            @keyframes bgMove{
                0%{background-position:0% 50%;}
                50%{background-position:100% 50%;}
                100%{background-position:0% 50%;}
            }            
            canvas{
                display:block;
                margin:0 auto;
                background:#0a0a0a;
                border: 1px solid rgba(255,255,255,0.08);
                border-radius: 12px;
                box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 60px rgba(255,255,255,0.02);
            }
            #message{
                position:absolute;
                left:50%;
                top:50%;
                transform:translate(-50%, -50%);
                font-size:28px;
                text-align:center;
                pointer-events:none;
                color:white;
                text-shadow:0 0 10px rgba(255,255,255,0.15);
            }
            #title{
                position:absolute;
                top:20px;
                left:50%;
                transform:translateX(-50%);
                font-size:64px;
                font-weight:600;
                letter-spacing:6px;
                color:#f4f4f4;
                font-family:'Inter', sans-serif;
                text-shadow:0 0 18px rgba (255,255,255,0.15);
                pointer-events: none;
                transition: opacity 0.6s ease;
                animation: introDrop 0.8s ease-out;
            }
            #instructions{
                position:absolute;
                top:100px;
                left:50%;
                transform:translateX(-50%);
                font-size:14px;
                font-weight:400;
                letter-spacing:0.5px;
                color:rgba(255,255,255,0.5);
                font-family:'Inter', sans-serif;
                pointer-events:none;
                text-align:center;
            }
            @keyframes introDrop{
                0%{
                    transform: translateX(-50%) translateY(-30px);
                    opacity:0;
                }
                100%{
                    transform:translateX(-50%) translateY(0);
                    opacity:1;
                }
            }
            #flash{
                position:fixed;
                top:0;
                left:0;
                width:100%;
                height:100%;
                background:white;
                opacity:0;
                pointer-events:none;
                z-index:999;
            }
        </style>
    </head>
    <body>
        <div id="title">COSMO-RUN</div>
        <div id="instructions">SPACE to jump &nbsp;&middot;&nbsp; clear spikes &nbsp;&middot;&nbsp; land on top of blocks for bonus points</div>
        <div id="message">Press SPACE to start</div>
        <div id="flash"></div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <script>
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");
            const groundY = 340;
            let gameStarted=false;
            let gameOver=false;

            let player ={
                x:100,
                y:groundY,
                size: 30,
                velocityY:0,
                jumpPower:-14,
                gravity:0.7,
                onGround:true
            };
            let obstacles=[];
            let spawnTimer=0;
            let nextSpawn = 60 + Math.random() * 60;
            let frameCount=0;
            let score=0;
            let level = 1;
            let speed = 5;
            let nextLevelScore = 600;
            let cubeRotation =0;
            let backgroundOffset=0;
            let bgFarOffset = 0;
            let bgMidOffset = 0;
            let stars = [];
            for(let i = 0; i<120; i++){
                stars.push({
                    x:Math.random() *800,
                    y: Math.random() *400,
                    size:0.5 + Math.random()*2.5,
                    speed:0.05 + Math.random() *0.25,
                    alpha:0.2 + Math.random() *0.8
                });
            }
            const BLOCK_LANDING_BONUS = 50;
            function spawnObstacle(){
                const type = Math.random() <0.5 ? "spike" : "block";
                if(type === "spike"){
                    let height=20 + Math.random() * 60;
                    obstacles.push({
                        type:"spike",
                        x:canvas.width,
                        width:30,
                        height:height
                    });
                }else{
                    let height =40 + Math.random() * 80;
                    obstacles.push({
                        type:"block",
                        x:canvas.width,
                        width:30 + Math.random() *40,
                        height:height,
                        scored:false
                    })
                }
            }
            function drawPlayer(){
                const x = player.x;
                const y = player.y - player.size;
                const size = player.size;
                const radius = 5;
                ctx.save();
                ctx.translate(x+size/2, y+size/2);
                ctx.rotate(cubeRotation);
                ctx.shadowColor ="#ffffff";
                ctx.shadowBlur =3;
                ctx.fillStyle ="#eaeaea";
                ctx.beginPath();
                ctx.moveTo(-size/2 + radius, -size/2);
                ctx.lineTo(size/2 - radius, -size/2);
                ctx.quadraticCurveTo(size/2, -size/2, size/2, -size/2+radius);
                ctx.lineTo(size/2,size/2-radius);
                ctx.quadraticCurveTo(size/2,size/2,size/2-radius,size/2);
                ctx.lineTo(-size/2+radius,size/2);
                ctx.quadraticCurveTo(-size/2,size/2,-size/2,size/2-radius);
                ctx.lineTo(-size/2, -size/2 + radius);
                ctx.quadraticCurveTo(-size/2, -size/2, -size/2 + radius, -size/2)
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur=0;
                ctx.restore();
                ctx.globalAlpha = 0.95
            }

            function drawTriangle(obs){
                ctx.shadowColor = "rgba(255,255,255,0.2)";
                ctx.shadowBlur = 10;
                ctx.fillStyle="#bfbfbf";
                ctx.beginPath();
                ctx.moveTo(obs.x, groundY);
                ctx.lineTo(obs.x + obs.width/2, groundY-obs.height);
                ctx.lineTo(obs.x + obs.width, groundY);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            function drawObstacle(o){
                if(o.type ==="spike"){
                    drawTriangle(o);
                }

                if(o.type === "block"){
                    ctx.fillStyle = o.scored ? "#9fe6a0" : "#d0d0d0";
                    ctx.shadowColor = o.scored ? "rgba(159,230,160,0.35)" : "rgba(255,255,255,0.15)";
                    ctx.shadowBlur = 8;

                    ctx.fillRect(
                        o.x,
                        groundY - o.height,
                        o.width,
                        o.height
                    );

                    ctx.shadowBlur = 0;
                }
            }
            

            function update(){
                if(!gameStarted || gameOver)return;
                player.velocityY += player.gravity;
                player.y += player.velocityY;

                if(player.y >= groundY){
                    player.y=groundY;
                    player.velocityY = 0;
                    player.onGround = true;
                }else{
                    player.onGround=false;
                }
                if(!player.onGround){
                    cubeRotation += speed * 0.03;
                }else{
                    const quarterTurn = Math.PI / 2;
                    cubeRotation = Math.round(cubeRotation/quarterTurn)*quarterTurn;
                }
                for(let i = 0; i < obstacles.length; i++){
                    const o = obstacles[i];
                    o.x -= speed;
                    const px = player.x;
                    const py = player.y;
                    const ps = player.size;
                    const xOverlap = px < o.x + o.width && px + ps > o.x;
                    if(!xOverlap) continue;
                    if(o.type === "spike"){
                        const centerX = (px + ps/2) - o.x;
                        const t = centerX / o.width;

                        const spikeHeight = o.height * (1 - Math.abs(t - 0.5) * 2);
                        const groundAtX = groundY - spikeHeight;

                        if(py > groundAtX - ps){
                            endGame();
                        }
                    }
                    if(o.type==="block"){
                        const blockTop =groundY - o.height;
                        const prevFootY =py - player.velocityY;
                        const isFalling =player.velocityY >= 0;
                        const wasAboveTop =prevFootY <= blockTop;

                        if(py>blockTop){
                            if(wasAboveTop&&isFalling){
                                player.y =blockTop;
                                player.velocityY= 0;
                                player.onGround= true;
                                if(!o.scored){
                                    o.scored= true;
                                    score +=BLOCK_LANDING_BONUS;
                                }
                            }else{
                                endGame();
                            }
                        }
                    }
                }
                obstacles = obstacles.filter(o => o.x > -50);  
                const gridSize = 40;
                bgFarOffset -= speed *0.1;
                bgMidOffset -= speed *0.3;
                backgroundOffset -= speed *0.6;
                frameCount++;
                spawnTimer++
                if(spawnTimer > nextSpawn){
                    spawnObstacle();
                    spawnTimer=0;
                    nextSpawn=40 + Math.random()*(90 - level *5);
                }
                score++;
                if (score >= nextLevelScore){
                    level++;
                    speed += 0.7;
                    nextLevelScore += 600;
                }
            }
            function drawStars(){
                for(let star of stars){
                    ctx.globalAlpha = star.alpha + Math.sin(frameCount * 0.03 + star.x) * 0.2;
                    ctx.fillStyle = "white";
                    ctx.beginPath();
                    ctx.arc(star.x,star.y,star.size,0,Math.PI*2);
                    ctx.fill();
                    star.x -= star.speed;
                    if(star.x <0){
                        star.x = canvas.width;
                        star.y = Math.random() * (groundY - 20);
                    }
                }
                ctx.globalAlpha = 1;
            }

            function drawBackground(){
                ctx.fillStyle = "#090909";
                ctx.fillRect(0,0,canvas.width,groundY);
            }

            function draw(){
                ctx.clearRect(0,0,canvas.width,canvas.height);
                drawBackground();
                drawStars();
                ctx.fillStyle="rgba(255,255,255,0.08)";
                ctx.fillRect(0, groundY, canvas.width, 1);
                ctx.fillStyle = "rgba(255,255,255,0.08)"
                ctx.fillRect(0,groundY, canvas.width, 1);
                drawPlayer();
                for(let obs of obstacles){
                    drawObstacle(obs);
                }
                ctx.font = "600 16px Inter, sans-serif";
                ctx.fillStyle = "white";
                ctx.fillText("Score: " + score, 10, 20);
                ctx.fillText("Level: " + level, 10, 40);
            }
            function loop(){
                update();
                draw();
                requestAnimationFrame(loop);
            }
            loop();

            document.addEventListener("keydown", (e) => {
                if(e.code === "Space"){
                    if(!gameStarted){
                        gameStarted = true;
                        document.getElementById("message").style.display = "none";
                        document.getElementById("instructions").style.display = "none";
                        flashScreen();
                    }
                    if(gameOver){
                        location.reload();
                    }
                    if(player.onGround){
                        player.velocityY = player.jumpPower;
                    }
                }
            });

            function flashScreen(){
                const flash = document.getElementById("flash");
                flash.style.opacity="1";

                setTimeout(() => {
                    flash.style.transition = "opacity 0.3s ease";
                    flash.style.opacity = "0";
                }, 50);
            }
            function endGame(){
                gameOver =true;
                document.getElementById("message").style.display = "block";
                document.getElementById("message").innerText = "Game Over - Score: " + score + " : Press SPACE to restart";
            }
        </script>
    </body>
</html>
